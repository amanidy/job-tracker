<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css" />
  <title>Job Tracker App</title>
</head>

<body>
  
  <header>
    <h2>Hello,welcome to Job Tracker!👋🏽</h2>
    <p>Ready to track your job applications?</p>
  </header>
  
<button class="add-job"type="button">Add Job Application</button>
  
  <section class="form-section">
    <form id="form" action="" method="get" accept-charset="utf-8">
      <h3 class="form-title">Add Job Application </h3>
      
      <div class="form-group">
         <label for="name">Company's Name:</label>
      <input type="text" name="name" id="name" value="" required/>
      </div>
      
      <div class="form-group">
       <label for="role">Role:</label>
      <input type="text" name="role" id="role" value="" required/> 
      </div>
     
      <div class="form-group">
         <label for="url">Company's URL:</label>
      <input type="text" name="url" id="url" value="" required/>
      </div>
      
      <div class="form-group">
         <label for="date">Date:</label>
      <input type="text" name="date" id="date" required/>
      </div>
      
      <div class="form-group">
        
       <label for="status">Status:</label>
      <select name="status" id="status">Status
      <option id="applied" default value="applied">Applied</option>
      
       <option value="phone">Phone Screen</option>
        <option value="interview">Interview</option>
         <option value="offer">Offer</option>
          <option value="rejected">Rejected</option>
           <option value="withdrawn">Withdrawn</option>
            <option value="ghosted">Ghosted</option>
      </select>
      </div>
      
      <button onclick="handleAddSubmit()" class="submit-btn" type="submit">Submit Application</button>
      
    </form>
    
  </section>
  
  <section class="table-section">
    <table border="0">
      
    </table>
    
  </section>
  
  <script src='../js/script.js' type="text/javascript" charset="utf-8">
  </script>
</body>

</html>
