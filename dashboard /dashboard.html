<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../style.css" />
  <title>Hello</title>
</head>

<body>
  <div class="app">
    <header>
      <h2>📊 Dashboard</h2>
      <p>Applications overview from job tracking</p>
    </header>

    <a href="../index.html" class="back-btn">← Back to Applications</a>
    
     <section class="highlights">
      <div class="card">
        <h3>📈</h3>
        <p class="title">Response Rate</p>
        <p class="value" id="response-rate"> 0 %</p>
      </div>
      <div class="card">
        <h3>🧾</h3>
        <p class="title">Total Applications</p>
        <p class="value" id="total-applications">0</p>
      </div>
      <div class="card">
        <h3>📅</h3>
        <p class="title">Applications Interviews</p>
        <p class="value" id="total-interviews">0</p>
      </div>
      <div class="card">
        <h3>🤝 </h3>
        <p class="title">Application Offers</p>
        <p class="value" id="total-offers">0</p>
      </div>
    </section>

    
  </div>
  
  <script src="../js/dashboard.js" type="text/javascript" charset="utf-8">
  </script>

</html>
